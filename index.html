<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>HALOULA — Fashion Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/store.css"/>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-inner">
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle">
        <span></span><span></span><span></span>
      </button>
    </div>
    <a href="index.html" class="logo">
      <img src="images/WhatsApp Image 2026-04-17 at 2.33.46 PM.jpeg" alt="HALOULA" id="logoImg" onerror="this.style.display='none';document.getElementById('logoText').style.display='block'"/>
      <span id="logoText" style="display:none">HALOULA</span>
    </a>
    <div class="nav-right">
      <button class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- MAIN LAYOUT -->
<div class="store-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-head">
        <h3>Categories</h3>
        <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
      </div>
      <ul class="cat-list" id="catList">
        <li class="cat-item active" data-cat="all" onclick="filterCat(this,'all')">
          <i class="fas fa-th"></i> All Products
        </li>
        <li class="cat-item" data-cat="فساتين" onclick="filterCat(this,'فساتين')">
          <i class="fas fa-female"></i> Dresses
        </li>
        <li class="cat-item" data-cat="بلوزات" onclick="filterCat(this,'بلوزات')">
          <i class="fas fa-tshirt"></i> Tops
        </li>
        <li class="cat-item" data-cat="بناطيل" onclick="filterCat(this,'بناطيل')">
          <i class="fas fa-stream"></i> Pants
        </li>
        <li class="cat-item" data-cat="أطقم" onclick="filterCat(this,'أطقم')">
          <i class="fas fa-layer-group"></i> Sets
        </li>
        <li class="cat-item" data-cat="تيشيرتات" onclick="filterCat(this,'تيشيرتات')">
          <i class="fas fa-tshirt"></i> T-Shirts
        </li>
        <li class="cat-item" data-cat="جيبات" onclick="filterCat(this,'جيبات')">
          <i class="fas fa-circle"></i> Skirts
        </li>
        <li class="cat-item" data-cat="أطفال" onclick="filterCat(this,'أطفال')">
          <i class="fas fa-child"></i> Kids
        </li>
      </ul>
      <div class="sidebar-footer">
        <a href="https://wa.me/201021102607" target="_blank" class="wa-link">
          <i class="fab fa-whatsapp"></i> WhatsApp Us
        </a>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- PRODUCTS AREA -->
  <main class="products-area">
    <div class="products-topbar">
      <div class="topbar-left">
        <h2 id="currentCatTitle">All Products</h2>
        <span class="products-count" id="productsCount">0 items</span>
      </div>
      <div class="topbar-right">
        <select class="sort-select" id="sortSelect" onchange="sortProducts()">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="newest">Newest</option>
        </select>
      </div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="load-more-btn" onclick="loadMore()">Load More</button>
    </div>
  </main>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-head">
    <h3>Your Bag <span id="cartCount">0</span></h3>
    <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-drawer-items" id="cartItems">
    <div class="cart-empty-msg">Your bag is empty 🛍️</div>
  </div>
  <div class="cart-drawer-footer" id="cartFooter" style="display:none">
    <div class="cart-subtotal">Subtotal: <strong id="cartTotal">0</strong> EGP</div>
    <button class="checkout-btn" onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="order-modal">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <h3>Complete Your Order</h3>
    <div id="orderSummary"></div>
    <div class="order-form">
      <h4>Your Details</h4>
      <input type="text" id="custName" placeholder="Full Name *" required/>
      <input type="tel" id="custPhone" placeholder="Phone Number *" required/>
      <input type="text" id="custAddress" placeholder="Address (City + Details) *" required/>
      <textarea id="custNotes" placeholder="Additional Notes (Optional)"></textarea>
      <h4>Payment Method</h4>
      <div class="payment-opts">
        <label class="pay-opt">
          <input type="radio" name="payment" value="instapay" checked/>
          <span><i class="fas fa-mobile-alt"></i> InstaPay</span>
        </label>
        <label class="pay-opt">
          <input type="radio" name="payment" value="cash"/>
          <span><i class="fas fa-money-bill"></i> Cash on Delivery</span>
        </label>
      </div>
    </div>
    <button class="confirm-btn" onclick="submitOrder()">Confirm Order</button>
  </div>
</div>

<!-- PRODUCT LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()"/>
</div>

<script src="js/supabase-config.js"></script>
<script type="module" src="js/store.js"></script>
</body>
</html>
